<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Simulado PF - Agente Administrativo (Edital 2025)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #0b2b3d; /* Azul escuro PF */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .quiz-container {
            width: 100%;
            max-width: 700px;
            background: #FFFFFF;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 4px solid #ffcc00; /* Amarelo PF */
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .quiz-title {
            color: #0b2b3d;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1.2;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .quiz-subtitle {
            color: #0b2b3d;
            font-size: 18px;
            font-weight: 600;
            border-top: 2px solid #ffcc00;
            border-bottom: 2px solid #ffcc00;
            display: inline-block;
            padding: 8px 20px;
            margin-top: 5px;
        }
        
        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #e6f0fa;
            border-radius: 60px;
            border: 2px solid #ffcc00;
        }
        
        .question-counter {
            background: #0b2b3d;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 40px;
            border: 2px solid #ffcc00;
            min-width: 70px;
            text-align: center;
        }
        
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #b0c4de;
            border-radius: 30px;
            margin: 0 15px;
            overflow: hidden;
            border: 1px solid #ffcc00;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0b2b3d, #ffcc00);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
        }
        
        .category-badge {
            background: #0b2b3d;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 30px;
            border: 2px solid #ffcc00;
            min-width: 100px;
            text-align: center;
        }
        
        .timer-container {
            text-align: center;
            margin: 15px 0;
        }
        
        .timer {
            display: inline-block;
            background: #0b2b3d;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 60px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .question-area {
            background: #f0f5fa;
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 25px;
            border-left: 5px solid #0b2b3d;
            border-right: 5px solid #ffcc00;
            box-shadow: 0 5px 15px rgba(11,43,61,0.2);
        }
        
        .question-text {
            color: #0b2b3d;
            font-size: 20px;
            font-weight: 600;
            text-align: left;
            line-height: 1.5;
        }
        
        .options-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .option-btn-ce {
            background: white;
            border: 3px solid #0b2b3d;
            border-radius: 60px;
            padding: 18px 40px;
            color: #0b2b3d;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 150px;
            box-shadow: 0 4px 6px rgba(11,43,61,0.2);
        }
        
        .option-btn-ce:hover:not(:disabled) {
            background: #0b2b3d;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(11,43,61,0.3);
        }
        
        .option-btn-ce.selected-c {
            background: #0b2b3d;
            color: white;
            border-color: #ffcc00;
        }
        
        .option-btn-ce.selected-e {
            background: #0b2b3d;
            color: white;
            border-color: #ffcc00;
        }
        
        .option-btn-ce.correct-c {
            background: #2e7d32;
            border-color: #ffcc00;
            color: white;
        }
        
        .option-btn-ce.correct-e {
            background: #2e7d32;
            border-color: #ffcc00;
            color: white;
        }
        
        .option-btn-ce.incorrect-c {
            background: #c62828;
            border-color: #ffcc00;
            color: white;
        }
        
        .option-btn-ce.incorrect-e {
            background: #c62828;
            border-color: #ffcc00;
            color: white;
        }
        
        .option-btn-ce:disabled {
            opacity: 0.9;
            cursor: default;
            transform: none;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        
        .loading-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 4px solid #0b2b3d;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #b0c4de;
            border-top-color: #0b2b3d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .result-screen {
            text-align: center;
        }
        
        .final-score {
            background: linear-gradient(135deg, #0b2b3d, #1a4b6d);
            border-radius: 25px;
            padding: 30px;
            margin: 20px 0;
            color: white;
            border: 4px solid #ffcc00;
        }
        
        .score-number {
            font-size: 70px;
            font-weight: bold;
            line-height: 1;
            margin: 15px 0;
        }
        
        .score-label {
            font-size: 24px;
            opacity: 0.9;
        }
        
        .level-result {
            font-size: 22px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,204,0,0.2);
            border-radius: 60px;
            border: 2px solid #ffcc00;
        }
        
        .action-btn {
            background: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            color: #0b2b3d;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            box-shadow: 0 4px 10px rgba(11,43,61,0.3);
            border: 3px solid #ffcc00;
            transition: all 0.2s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255,204,0,0.5);
            background: #f0f5fa;
        }
        
        .action-btn.secondary {
            background: #e6f0fa;
        }
        
        .name-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 15px;
            border: 3px solid #ffcc00;
            margin: 10px 0;
            transition: all 0.2s ease;
            color: #0b2b3d;
            font-weight: bold;
        }
        
        .name-input:focus {
            outline: none;
            border-color: #0b2b3d;
            box-shadow: 0 0 0 3px rgba(255,204,0,0.3);
        }
        
        .name-input::placeholder {
            color: #95a5a6;
            font-weight: normal;
        }
        
        .stats-container {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #e6f0fa;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .stats-correct {
            color: #2e7d32;
        }
        
        .stats-wrong {
            color: #c62828;
        }
        
        @media (max-width: 480px) {
            .quiz-title { font-size: 24px; }
            .question-text { font-size: 18px; }
            .option-btn-ce { 
                font-size: 24px; 
                padding: 15px 25px;
                min-width: 120px;
            }
            .score-number { font-size: 60px; }
            .progress-container { 
                flex-direction: column; 
                gap: 10px; 
            }
            .progress-bar { 
                width: 100%; 
                margin: 10px 0; 
            }
            .category-badge { 
                min-width: 100%; 
            }
            .options-container {
                gap: 15px;
            }
        }
    </style>
</head>

        const TOTAL_QUESTIONS = questions.length;
        let current = 0;
        let score = 0;
        let answered = false;
        let userAnswers = [];
        let timer;
        let timeLeft = 70; // 70 segundos por questão

        function startTimer() {
            clearInterval(timer);
            timeLeft = 70;
            updateTimerDisplay();
            
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    if (!answered) {
                        userAnswers.push(0);
                        nextQuestion();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            if (timerEl) timerEl.textContent = `⏳ ${timeLeft}s`;
        }

        function showQuestion() {
            answered = false;
            const q = questions[current];
            
            let html = `
                <div class="quiz-header">
                    <div class="quiz-title">PF - AGENTE ADMINISTRATIVO 2025</div>
                    <div class="quiz-subtitle">SIMULADO CEBRASPE (C/E)</div>
                    
                    <div class="progress-container">
                        <div class="question-counter">${current + 1}/${TOTAL_QUESTIONS}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${((current + 1) / TOTAL_QUESTIONS) * 100}%"></div>
                        </div>
                        <div class="category-badge">${q.category}</div>
                    </div>
                    
                    <div class="timer-container">
                        <div class="timer" id="timer">⏳ 70s</div>
                    </div>
                </div>
                
                <div class="question-area">
                    <div class="question-text">${q.question}</div>
                </div>
                
                <div class="options-container" id="optionsContainer">
                    <button class="option-btn-ce" onclick="selectOption(1)" id="btn-c">C - CERTO</button>
                    <button class="option-btn-ce" onclick="selectOption(2)" id="btn-e">E - ERRADO</button>
                </div>
            `;
            
            document.getElementById('quizContent').innerHTML = html;
            startTimer();
        }

        function selectOption(selected) {
            if (answered) return;
            answered = true;
            clearInterval(timer);
            
            const correct = questions[current].answer;
            const btnC = document.getElementById('btn-c');
            const btnE = document.getElementById('btn-e');
            
            // Remove classes anteriores
            btnC.classList.remove('selected-c', 'correct-c', 'incorrect-c');
            btnE.classList.remove('selected-e', 'correct-e', 'incorrect-e');
            
            // Marca o selecionado
            if (selected === 1) {
                btnC.classList.add('selected-c');
            } else {
                btnE.classList.add('selected-e');
            }
            
            setTimeout(() => {
                // Mostra resposta correta/incorreta
                if (correct === 1) {
                    btnC.classList.add('correct-c');
                    if (selected !== 1) btnE.classList.add('incorrect-e');
                } else {
                    btnE.classList.add('correct-e');
                    if (selected !== 2) btnC.classList.add('incorrect-c');
                }
                
                btnC.disabled = true;
                btnE.disabled = true;
                
                userAnswers.push(selected);
                if (selected === correct) {
                    score++;
                    if (typeof confetti !== 'undefined') {
                        confetti({
                            particleCount: 20,
                            spread: 40,
                            colors: ['#0b2b3d', '#ffcc00']
                        });
                    }
                }
                
                setTimeout(nextQuestion, 800);
            }, 300);
        }

        function nextQuestion() {
            current++;
            if (current < questions.length) {
                showQuestion();
            } else {
                showFinalScreen();
            }
        }

        function showFinalScreen() {
            let levelMessage = "";
            let levelEmoji = "";
            
            if (score >= 100) {
                levelMessage = "APROVADO - Excelente desempenho! 🌟";
                levelEmoji = "🏆";
                if (typeof confetti !== 'undefined') {
                    confetti({ particleCount: 200, spread: 120, colors: ['#0b2b3d', '#ffcc00'] });
                }
            } else if (score >= 80) {
                levelMessage = "CLASSIFICADO - Muito bem! 👍";
                levelEmoji = "📚";
                if (typeof confetti !== 'undefined') {
                    confetti({ particleCount: 100, spread: 80, colors: ['#ffcc00'] });
                }
            } else if (score >= 60) {
                levelMessage = "HABILITADO - Bom desempenho! 💪";
                levelEmoji = "📝";
            } else {
                levelMessage = "ESTUDE MAIS - Continue praticando! 📖";
                levelEmoji = "📖";
            }
            
            let acertos = score;
            let erros = TOTAL_QUESTIONS - score;
            
            let html = `
                <div class="quiz-header">
                    <div class="quiz-title">PF - AGENTE ADMINISTRATIVO</div>
                    <div class="quiz-subtitle">RESULTADO FINAL</div>
                </div>
                
                <div class="result-screen">
                    <div class="final-score">
                        <div class="score-label">Acertos</div>
                        <div class="score-number">${acertos}/${TOTAL_QUESTIONS}</div>
                        <div class="stats-container">
                            <span class="stats-correct">✅ ${acertos} corretas</span>
                            <span class="stats-wrong">❌ ${erros} incorretas</span>
                        </div>
                        <div class="level-result">${levelEmoji} ${levelMessage}</div>
                    </div>
                    
                    <button class="action-btn" onclick="redirectToResultados()">
                        🔗 VER GABARITO COMPLETO
                    </button>
                    
                    <button class="action-btn secondary" onclick="redirectToConcurso()">
                        🚀 MAIS SIMULADOS
                    </button>
                    
                    <input type="text" class="name-input" id="participantName" 
                           placeholder="Digite seu nome">
                    <button class="action-btn secondary" onclick="sendResults()">
                        💾 SALVAR RESULTADO
                    </button>
                </div>
            `;
            
            document.getElementById('quizContent').innerHTML = html;
        }

        function redirectToResultados() {
            window.open(CONCURSO_LINK, '_blank');
        }

        function redirectToConcurso() {
            window.open(CONCURSO_LINK, '_blank');
        }

        function sendResults() {
            const name = document.getElementById('participantName').value.trim();
            if (!name) {
                alert('Por favor, digite seu nome!');
                return;
            }
            
            document.getElementById('loading').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                alert(`Parabéns ${name}! Você acertou ${score}/${TOTAL_QUESTIONS} questões.`);
            }, 1000);
        }

        // Carrega a biblioteca de confete e inicia o quiz
        function loadConfettiAndStart() {
            if (typeof confetti === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js';
                script.onload = function() {
                    showQuestion();
                };
                document.head.appendChild(script);
            } else {
                showQuestion();
            }
        }

        // Inicia o quiz
        loadConfettiAndStart();
    </script>
