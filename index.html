        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            background: #0b2b3d; /* Azul escuro PF */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .quiz-container {
            width: 100%;
            max-width: 700px;
            background: #FFFFFF;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 4px solid #ffcc00; /* Amarelo PF */
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .quiz-title {
            color: #0b2b3d;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1.2;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .quiz-subtitle {
            color: #0b2b3d;
            font-size: 18px;
            font-weight: 600;
            border-top: 2px solid #ffcc00;
            border-bottom: 2px solid #ffcc00;
            display: inline-block;
            padding: 8px 20px;
            margin-top: 5px;
        }
        
        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #e6f0fa;
            border-radius: 60px;
            border: 2px solid #ffcc00;
        }
        
        .question-counter {
            background: #0b2b3d;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 40px;
            border: 2px solid #ffcc00;
            min-width: 70px;
            text-align: center;
        }
        
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #b0c4de;
            border-radius: 30px;
            margin: 0 15px;
            overflow: hidden;
            border: 1px solid #ffcc00;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0b2b3d, #ffcc00);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
        }
        
        .category-badge {
            background: #0b2b3d;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 30px;
            border: 2px solid #ffcc00;
            min-width: 100px;
            text-align: center;
        }
        
        .timer-container {
            text-align: center;
            margin: 15px 0;
        }
        
        .timer {
            display: inline-block;
            background: #0b2b3d;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 60px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .question-area {
            background: #f0f5fa;
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 25px;
            border-left: 5px solid #0b2b3d;
            border-right: 5px solid #ffcc00;
            box-shadow: 0 5px 15px rgba(11,43,61,0.2);
        }
        
        .question-text {
            color: #0b2b3d;
            font-size: 20px;
            font-weight: 600;
            text-align: left;
            line-height: 1.5;
        }

            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

            border-radius: 60px;
            padding: 18px 40px;
            color: #0b2b3d;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 150px;
            box-shadow: 0 4px 6px rgba(11,43,61,0.2);
        }

            background: #0b2b3d;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(11,43,61,0.3);
        }

            background: #0b2b3d;
            color: white;
            border-color: #ffcc00;
        }

            background: #0b2b3d;
            color: white;
            border-color: #ffcc00;
        }

            border-color: #ffcc00;
            color: white;
        }

            background: #2e7d32;
            border-color: #ffcc00;
            color: white;
        }

            border-color: #ffcc00;
            color: white;
        }

            background: #c62828;
            border-color: #ffcc00;
            color: white;
        }

            opacity: 0.9;
            cursor: default;
            transform: none;
        }

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;

            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 4px solid #0b2b3d;
        }

            border-top-color: #0b2b3d;
            border-radius: 50%;

            margin: 20px auto;

            to { transform: rotate(360deg); }
        }

        }

            padding: 15px;
            background: rgba(255,204,0,0.2);

        }

            border-radius: 15px;
            border: 3px solid #ffcc00;
            margin: 10px 0;

            color: #0b2b3d;

        }

                margin: 10px 0;

                gap: 15px;
